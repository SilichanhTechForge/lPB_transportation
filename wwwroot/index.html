<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LpbGO | Luang Prabang Transport</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap');

        :root {
            --bg-color: #0f172a;
            --glass-bg: rgba(30, 41, 59, 0.7);
            --glass-border: rgba(255, 255, 255, 0.1);
            --primary: #10b981;
            --primary-hover: #059669;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            background-image: radial-gradient(circle at top right, #1e293b, #0f172a);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2rem;
        }

        .header {
            text-align: center;
            margin-bottom: 3rem;
        }

        .header h1 {
            font-size: 3rem;
            font-weight: 700;
            background: linear-gradient(135deg, #34d399, #10b981);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
        }

        .header p {
            color: var(--text-muted);
            font-size: 1.1rem;
        }

        .container {
            width: 100%;
            max-width: 500px;
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 2rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .form-group {
            margin-bottom: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        label {
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        select {
            appearance: none;
            background: rgba(15, 23, 42, 0.8);
            border: 1px solid var(--glass-border);
            color: white;
            padding: 1rem;
            border-radius: 12px;
            font-size: 1rem;
            outline: none;
            transition: all 0.3s ease;
        }

        select:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.2);
        }

        button.search-btn {
            width: 100%;
            padding: 1.2rem;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 1rem;
        }

        button.search-btn:hover {
            background: var(--primary-hover);
            transform: translateY(-2px);
            box-shadow: 0 10px 20px -10px var(--primary);
        }

        .results {
            margin-top: 2rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .route-card {
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: transform 0.2s ease;
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }
        
        .route-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 4px; height: 100%;
            background: var(--primary);
        }

        .route-card:hover {
            transform: scale(1.02);
            background: rgba(30, 41, 59, 1);
        }

        .route-times {
            font-size: 1.4rem;
            font-weight: 700;
        }

        .route-times span {
            color: var(--text-muted);
            font-size: 1rem;
            font-weight: 400;
            margin: 0 0.5rem;
        }

        .route-price {
            font-size: 1.2rem;
            font-weight: 600;
            color: var(--primary);
            text-align: right;
        }
        
        .no-results {
            text-align: center;
            color: var(--text-muted);
            padding: 2rem 0;
            font-size: 1.1rem;
        }

        .fullscreen-ticket {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #1e293b;
            z-index: 2000;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            animation: fadeIn 0.3s ease;
        }

        .ticket-header {
            position: absolute;
            top: 0; left: 0; width: 100%;
            background: var(--primary);
            color: #fff;
            padding: 1rem;
            text-align: center;
            font-size: 1.2rem;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            display: flex;
            justify-content: space-between;
        }

        .ticket-animation-box {
            width: 80vw;
            height: 80vw;
            max-width: 300px;
            max-height: 300px;
            background: white;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            box-shadow: 0 0 50px rgba(16, 185, 129, 0.4);
            border: 8px solid var(--primary);
            overflow: hidden;
        }
        
        .pulse-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(180deg, transparent 0%, rgba(16, 185, 129, 0.2) 50%, transparent 100%);
            animation: scanline 2s linear infinite;
        }

        @keyframes scanline {
            0% { transform: translateY(-100%); }
            100% { transform: translateY(100%); }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .action-btn {
            background: var(--primary); color: white;
            border: none; padding: 0.8rem 1.5rem;
            border-radius: 8px; cursor: pointer; font-size: 1rem;
            font-weight: 600; transition: all 0.2s;
            margin-right: 10px;
        }
        .action-btn:hover { background: var(--primary-hover); }

        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(4px);
            z-index: 1000;
            display: none;
            align-items: center;
            justify-content: center;
            animation: fadeIn 0.3s ease;
        }

        .modal {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 2.5rem;
            width: 90%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .modal h2 {
            margin-bottom: 0.5rem;
            color: var(--text-main);
        }

        .modal #paymentAmount {
            color: var(--primary);
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 1.5rem;
        }

        .modal img {
            width: 250px;
            height: 250px;
            background: white;
            padding: 10px;
            border-radius: 16px;
            margin-bottom: 1.5rem;
        }

        .close-btn {
            background: transparent;
            color: var(--text-muted);
            border: 1px solid var(--glass-border);
            padding: 0.8rem 1.5rem;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 600;
            transition: all 0.2s;
        }

        .close-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            color: white;
        }

        .support-fab {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            background: var(--primary);
            color: white;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            box-shadow: 0 10px 25px rgba(16, 185, 129, 0.5);
            cursor: pointer;
            transition: transform 0.3s;
            z-index: 100;
        }

        .support-fab:hover {
            transform: scale(1.1);
        }

        .support-panel {
            position: fixed;
            bottom: 6rem;
            right: 2rem;
            width: 320px;
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 1.5rem;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
            display: none;
            flex-direction: column;
            z-index: 1000;
            animation: slideUp 0.3s ease;
        }

        .support-panel h3 {
            margin-bottom: 1rem;
        }

        .support-panel select, .support-panel textarea {
            width: 100%;
            background: rgba(15, 23, 42, 0.8);
            border: 1px solid var(--glass-border);
            color: white;
            padding: 0.8rem;
            border-radius: 8px;
            margin-bottom: 1rem;
            font-family: inherit;
        }

        .support-panel textarea {
            resize: none;
            height: 100px;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>LpbGO</h1>
        <p>Smart Travel in Luang Prabang</p>
    </div>

    <div class="container">
        <div class="form-group">
            <label>Departure</label>
            <select id="fromLocation">
                <option value="">Select departure point</option>
            </select>
        </div>

        <div class="form-group">
            <label>Destination</label>
            <select id="toLocation">
                <option value="">Select destination</option>
            </select>
        </div>

        <button class="search-btn" onclick="searchRoutes()">Find Routes</button>

        <div class="results" id="resultsArea">
            <!-- Results injected here -->
        </div>
    </div>

    <!-- Phajay Payment Modal -->
    <div class="modal-overlay" id="paymentModal">
        <div class="modal">
            <h2>Phajay BCEL Payment</h2>
            <p id="paymentAmount">Amount: ₭0</p>
            <img id="qrCodeImage" src="" alt="BCEL QR Code">
            <p style="font-size: 0.8rem; margin-top: -0.5rem; margin-bottom: 1.5rem;">Scan using Phajay App / BCEL One</p>
            <div>
                <button class="action-btn" onclick="simulatePaymentComplete()">I've Paid</button>
                <button class="close-btn" onclick="closeModal()">Cancel</button>
            </div>
        </div>
    </div>

    <!-- MAV-style Fullscreen Animated Ticket / QR -->
    <div class="fullscreen-ticket" id="liveTicket">
        <div class="ticket-header">
            <div onclick="closeTicket()" style="cursor: pointer;">❮ Back</div>
            <div>Valid Ticket</div>
            <div style="width: 50px;"></div>
        </div>
        <div style="margin-bottom: 2rem; text-align: center;">
            <h2 id="ticketRouteTitle" style="margin-bottom: 0.5rem;">Bus Transfer</h2>
            <p id="ticketDate" style="color: var(--text-muted);"></p>
        </div>
        
        <div class="ticket-animation-box" onclick="toggleQR()">
            <!-- Using aztec or QR for validation, like MAV -->
            <img id="finalTicketQR" src="" alt="Ticket Code" style="width: 90%; height: 90%; filter: drop-shadow(0px 0px 5px rgba(0,0,0,0.1));">
            <div class="pulse-overlay" id="scanPulse"></div>
        </div>
        
        <p style="margin-top: 2rem; color: var(--text-muted);">Show to Driver / Inspector</p>
        <div id="ticketIdDisplay" style="margin-top: 1rem; font-family: monospace; font-size: 1.2rem; background: rgba(0,0,0,0.3); padding: 0.5rem 1rem; border-radius: 8px;"></div>
    </div>

    <!-- Floating Support Bubble -->
    <div class="support-fab" onclick="toggleSupport()">💬</div>

    <!-- Support Panel -->
    <div class="support-panel" id="supportPanel">
        <h3>Contact Support</h3>
        <select id="supportCategory">
            <option value="Payment Issue">Payment Issue</option>
            <option value="Lost Item">Lost Item</option>
            <option value="App Bug">App Bug</option>
            <option value="General Question">General Question</option>
        </select>
        <textarea id="supportMessage" placeholder="Describe your issue..."></textarea>
        <div style="display: flex; gap: 10px;">
            <button id="supportSubmitBtn" class="action-btn" style="flex: 1; margin: 0;" onclick="submitSupport()">Send</button>
            <button class="close-btn" style="padding: 0.8rem 1rem;" onclick="toggleSupport()">Cancel</button>
        </div>
    </div>

    <script>
        let currentBookingScheduleId = null;

        // Load locations on startup
        async function init() {
            try {
                const res = await fetch('/transport/locations');
                const locations = await res.json();
                const fromSelect = document.getElementById('fromLocation');
                const toSelect = document.getElementById('toLocation');

                locations.forEach(loc => {
                    fromSelect.add(new Option(loc.name, loc.id));
                    toSelect.add(new Option(loc.name, loc.id));
                });
            } catch (err) {
                console.error("Failed to load locations", err);
            }
        }

        async function searchRoutes() {
            const fromId = document.getElementById('fromLocation').value;
            const toId = document.getElementById('toLocation').value;
            const resultsArea = document.getElementById('resultsArea');
            
            resultsArea.innerHTML = '<div class="no-results">Searching...</div>';

            let url = '/transport/schedules?';
            if (fromId) url += `fromLocationId=${fromId}&`;
            if (toId) url += `toLocationId=${toId}`;

            try {
                const res = await fetch(url);
                const schedules = await res.json();

                if (schedules.length === 0) {
                    resultsArea.innerHTML = '<div class="no-results">No direct routes found.</div>';
                    return;
                }

                resultsArea.innerHTML = '';
                schedules.forEach(schedule => {
                    const priceFormatted = new Intl.NumberFormat('en-US').format(schedule.priceInKip);
                    const card = `
                        <div class="route-card" onclick="bookTicket(${schedule.id}, ${schedule.priceInKip})">
                            <div>
                                <div class="route-times">
                                    ${schedule.departureTime} <span>→</span> ${schedule.arrivalTime}
                                </div>
                                <div style="color: #10b981; font-size: 0.9rem; margin-top: 0.3rem;">
                                    Route ID #${schedule.routeId} 
                                </div>
                            </div>
                            <div class="route-price">
                                ₭${priceFormatted}
                                <div style="font-size: 0.8rem; opacity: 0.7; color: var(--text-muted); font-weight: normal;">Tap to book</div>
                            </div>
                        </div>
                    `;
                    resultsArea.insertAdjacentHTML('beforeend', card);
                });
            } catch(e) {
                resultsArea.innerHTML = '<div class="no-results" style="color: #ef4444">Error loading schedules.</div>';
            }
        }

        async function bookTicket(scheduleId, priceInKip) {
            currentBookingScheduleId = scheduleId;
            document.getElementById('paymentModal').style.display = 'flex';
            document.getElementById('paymentAmount').innerText = 'Generating QR...';
            document.getElementById('qrCodeImage').style.opacity = '0.5';

            try {
                const res = await fetch('/tickets/phajay/' + scheduleId, { method: 'POST' });
                if (!res.ok) throw new Error("Failed to generate QR");
                
                const data = await res.json();
                
                const priceFormatted = new Intl.NumberFormat('en-US').format(data.amount);
                document.getElementById('paymentAmount').innerText = 'Amount: ₭' + priceFormatted;
                document.getElementById('qrCodeImage').src = data.qrCodeUrl;
                document.getElementById('qrCodeImage').style.opacity = '1';
                
            } catch (e) {
                alert('Error connecting to Phajay API');
                closeModal();
            }
        }

        async function simulatePaymentComplete() {
            if (!currentBookingScheduleId) return;

            try {
                const reqData = { UserId: "mobileUser_88", ScheduleId: currentBookingScheduleId };
                const res = await fetch('/tickets/purchase', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(reqData)
                });
                
                if (!res.ok) throw new Error("Purchase failed");

                const ticketData = await res.json();
                closeModal();
                showLiveTicket(ticketData);

            } catch(e) {
                alert('Payment verification failed.');
            }
        }

        function showLiveTicket(ticketData) {
            document.getElementById('liveTicket').style.display = 'flex';
            
            // Generate a QR code for the actual valid ticket (just a QR wrapping the GUID)
            const validateUrl = `https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=VALID_TICKET:${ticketData.id}`;
            document.getElementById('finalTicketQR').src = validateUrl;
            
            // Format nice date
            const dateStr = new Date(ticketData.purchaseDate).toLocaleString();
            document.getElementById('ticketDate').innerText = 'Valid since: ' + dateStr;
            document.getElementById('ticketIdDisplay').innerText = ticketData.id.split('-')[0].toUpperCase();
            
            // Make pulse active
            document.getElementById('scanPulse').style.display = 'block';
        }

        function closeTicket() {
            document.getElementById('liveTicket').style.display = 'none';
        }

        function closeModal() {
            document.getElementById('paymentModal').style.display = 'none';
        }

        // Run setup
        init();

        // Support functions
        function toggleSupport() {
            const panel = document.getElementById('supportPanel');
            panel.style.display = panel.style.display === 'flex' ? 'none' : 'flex';
        }

        async function submitSupport() {
            const category = document.getElementById('supportCategory').value;
            const message = document.getElementById('supportMessage').value;

            if(!message) {
                alert("Please enter a message");
                return;
            }

            const btn = document.getElementById('supportSubmitBtn');
            btn.innerText = "Sending...";
            btn.disabled = true;

            try {
                const res = await fetch('/support/submit', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ Category: category, Message: message })
                });

                if(res.ok) {
                    alert('Message sent to our Support Team! We will look into it.');
                    toggleSupport();
                    document.getElementById('supportMessage').value = '';
                } else {
                    alert('Failed to send message.');
                }
            } catch(e) {
                alert('Connection error.');
            } finally {
                btn.innerText = "Send Message";
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
