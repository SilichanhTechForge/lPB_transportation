<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inspector App - LpbGO</title>
    <!-- Include html5-qrcode library for camera scanning -->
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap');

        :root {
            --bg-color: #0f172a;
            --primary: #3b82f6; /* Blue for inspector */
            --success: #10b981;
            --danger: #ef4444;
            --text-main: #f8fafc;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Outfit', sans-serif;
            margin: 0;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 { margin-bottom: 0.5rem; text-align: center; color: var(--primary); }
        p { color: #94a3b8; text-align: center; margin-bottom: 2rem; }

        .scanner-container {
            width: 100%;
            max-width: 400px;
            background: white;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        #reader { width: 100%; }

        .result-panel {
            margin-top: 2rem;
            width: 100%;
            max-width: 400px;
            padding: 1.5rem;
            border-radius: 12px;
            text-align: center;
            font-weight: bold;
            font-size: 1.2rem;
            display: none;
            animation: slideUp 0.3s ease;
        }

        @keyframes slideUp {
            from { transform: translateY(20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .success { background: rgba(16, 185, 129, 0.2); border: 2px solid var(--success); color: var(--success); }
        .error { background: rgba(239, 68, 68, 0.2); border: 2px solid var(--danger); color: var(--danger); }

        button {
            margin-top: 1rem;
            padding: 0.8rem 2rem;
            background: var(--text-main);
            color: var(--bg-color);
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <h1>Inspector Terminal</h1>
    <p>Scan passenger QR codes to validate entry.</p>

    <div class="scanner-container">
        <!-- The QR scanner renders here -->
        <div id="reader"></div>
    </div>

    <div id="resultPanel" class="result-panel">
        <div id="resultText"></div>
        <button onclick="resetScanner()">Scan Next Ticket</button>
    </div>

    <script>
        let html5QrcodeScanner;

        function onScanSuccess(decodedText, decodedResult) {
            // Our tickets were generated with prefix "VALID_TICKET:"
            if(decodedText.startsWith("VALID_TICKET:")) {
                const ticketId = decodedText.split("VALID_TICKET:")[1];
                html5QrcodeScanner.pause(true); // Stop scanning while checking
                validateTicketOnServer(ticketId);
            } else {
                showResult("Invalid QR Format!", false);
            }
        }

        async function validateTicketOnServer(ticketId) {
            try {
                // Call the F# Validate Endpoint
                const res = await fetch('/tickets/validate/' + ticketId, { method: 'POST' });
                const data = await res.json();

                if (res.ok && data.success) {
                    showResult("✅ Valid Ticket consumed!<br>Passenger can enter.", true);
                } else {
                    showResult("❌ " + (data.message || "Ticket invalid or already used."), false);
                }
            } catch (err) {
                showResult("❌ Network Error: Could not reach server.", false);
            }
        }

        function showResult(message, isSuccess) {
            const panel = document.getElementById('resultPanel');
            const text = document.getElementById('resultText');
            
            panel.className = 'result-panel ' + (isSuccess ? 'success' : 'error');
            text.innerHTML = message;
            panel.style.display = 'block';
        }

        function resetScanner() {
            document.getElementById('resultPanel').style.display = 'none';
            html5QrcodeScanner.resume(); // Resume webcam
        }

        // Initialize scanner when DOM loads
        window.addEventListener('load', () => {
            html5QrcodeScanner = new Html5QrcodeScanner(
                "reader", { fps: 10, qrbox: {width: 250, height: 250} }, /* verbose= */ false);
            html5QrcodeScanner.render(onScanSuccess);
        });
    </script>
</body>
</html>
